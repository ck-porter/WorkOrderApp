name: Build and deploy ASP.Net Core app to Azure Web App - workorderapp

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # Restore the correct project
      - name: Restore
        run: dotnet restore ./WorkOrderApp/WorkOrderApp.csproj

      # Build the correct project
      - name: Build
        run: dotnet build ./WorkOrderApp/WorkOrderApp.csproj --configuration Release --no-restore

      # Publish the correct project to ./publish
      - name: Publish
        run: dotnet publish ./WorkOrderApp/WorkOrderApp.csproj -c Release -o ./publish

      # Upload the publish folder as the artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_75C070EDF6274BF18B84155A2DEBB169 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_155E363D4A494C32A946B89467AED0ED }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_887462950A7A4BA39450F96EE6E0ACF9 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'workorderapp'
          slot-name: 'Production'
          package: .
